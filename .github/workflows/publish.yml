on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Uncomment below if any .qmd files execute R or Python code that
      # is NOT already cached in /_freeze (freeze: auto only re-executes
      # what changed, but CI still needs the packages installed once).
      #
      # - name: Set up R
      #   uses: r-lib/actions/setup-r@v2
      # - name: Install R dependencies
      #   uses: r-lib/actions/setup-renv@v2
      #
      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.12"
      # - run: pip install -r requirements.txt

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
